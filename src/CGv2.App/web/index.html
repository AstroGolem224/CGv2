<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CGv2 — Activity Ledger</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600&family=IBM+Plex+Mono:wght@400;500&display=swap');
body{margin:0;background:#0E1116;font-family:'IBM Plex Mono',ui-monospace,monospace}
.cg-wrap{width:100%;max-width:none}
.cg-win{background:#0E1116;color:#E6E9EE}
.cg-bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:9px;height:38px;background:#0A0D11;border-bottom:1px solid #1c232c;padding:0 6px 0 12px;user-select:none}
.cg-bt{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:13px}
.cg-btag{font-size:11px;color:#7c8694}
.tb-btn{width:32px;height:26px;display:flex;align-items:center;justify-content:center;color:#9aa3b0;border-radius:6px;font-size:15px;cursor:pointer}
.tb-btn:hover{background:#1b2230;color:#E6E9EE}
.tb-btn.cl:hover{background:#E2685A;color:#0E1116}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:#0B0E13}
::-webkit-scrollbar-thumb{background:#2a323d;border-radius:6px;border:2px solid #0B0E13}
::-webkit-scrollbar-thumb:hover{background:#3a4452}
::-webkit-scrollbar-corner{background:#0B0E13}
.cg-grip{position:fixed;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:30}
.cg-grip::after{content:"";position:absolute;right:3px;bottom:3px;width:10px;height:10px;background:repeating-linear-gradient(135deg,#586271 0 1.5px,transparent 1.5px 4px)}
.cg-body{padding:16px 18px 20px}
.cg-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.cg-h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:18px;margin:0}
.cg-sub{font-size:11px;color:#7c8694;margin-top:3px}
.cg-acts{display:flex;gap:8px}
.cg-range{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cg-rlabel{font-size:12px;color:#7c8694}
.cg-date{color-scheme:dark;background:#161B22;color:#E6E9EE;border:1px solid #2a323d;border-radius:8px;padding:6px 9px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.cg-btn{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#cdd3db;background:#161B22;border:1px solid #2a323d;border-radius:8px;padding:7px 11px;cursor:pointer}
.cg-btn.amber{color:#0E1116;background:#F4A23C;border-color:#F4A23C;font-weight:500}
.cg-btn:active{transform:scale(.98)}
.cg-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cg-metric{background:#12161C;border:1px solid #1f262f;border-radius:8px;padding:9px 11px}
.cg-metric .l{font-size:11px;color:#7c8694}
.cg-metric .v{font-size:16px;color:#E6E9EE;margin-top:2px}
.cg-metric .v b{color:#5BD08A;font-weight:500}
.cg-grid{display:grid;grid-template-columns:104px 60px 60px 66px 1fr 56px 30px;align-items:center;gap:4px}
.cg-colh{font-size:11px;color:#6e7886;padding:0 0 8px;border-bottom:1px solid #1f262f}
.cg-scale{position:relative;height:12px;margin-right:12px}
.cg-scale span{position:absolute;top:0;font-size:11px;color:#5b6573}
.cg-row{padding:10px 0;border-bottom:1px solid #161c23}
.cg-row.dim{opacity:.62}
.cg-date-cell b{font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:14px}
.cg-date-cell span{font-size:11px;color:#7c8694;margin-right:5px}
.cg-time{font-size:13px;display:flex;align-items:center;gap:6px}
.cg-pip{width:7px;height:7px;border-radius:50%;flex:none}
.cg-work{font-size:13px;color:#5BD08A}
.cg-muted{color:#586271}
.cg-track{position:relative;height:22px;background:#0B0E13;border:1px solid #1c232c;border-radius:5px;overflow:hidden;margin-right:12px}
.cg-bar-active{position:absolute;top:7px;bottom:7px;background:#F4A23C;border-radius:2px}
.cg-gap{position:absolute;top:0;bottom:0;background:#0B0E13;border-left:1px solid #6e7886;border-right:1px solid #6e7886}
.cg-tick{position:absolute;top:0;width:1px;height:5px;background:#cdd3db}
.cg-onoff{position:relative;height:13px;margin-right:12px;margin-top:2px}
.cg-onoff .lab{position:absolute;font-size:11px;white-space:nowrap}
.cg-note{font-size:11px;color:#586271;line-height:22px;padding-left:8px}
.cg-sum{font-size:13px;text-align:right;padding-right:4px}
.cg-copy{display:flex;align-items:center;justify-content:center;color:#5b6573;cursor:pointer;font-size:15px}
.cg-copy:hover{color:#F4A23C}
.cg-foot{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:#6e7886}
.cg-key{display:inline-flex;align-items:center;gap:6px}
.cg-sw{width:10px;height:10px;border-radius:2px;flex:none}
</style></head>
<body>
<div class="cg-wrap">
 <div class="cg-win">
  <div class="cg-bar" id="cg-bar">
   <svg width="17" height="17" viewBox="0 0 256 256" aria-hidden="true" style="flex:none">
    <rect x="6" y="6" width="244" height="244" rx="52" fill="#14181F" stroke="#2a323d" stroke-width="6"/>
    <circle cx="128" cy="128" r="82" fill="#0E1116" stroke="#F4A23C" stroke-width="20"/>
    <line x1="128" y1="128" x2="96" y2="90" stroke="#E6E9EE" stroke-width="16" stroke-linecap="round"/>
    <line x1="128" y1="128" x2="174" y2="106" stroke="#F4A23C" stroke-width="16" stroke-linecap="round"/>
    <circle cx="128" cy="128" r="15" fill="#E6E9EE"/>
   </svg>
   <span class="cg-bt">CGv2</span><span class="cg-btag">· Activity Ledger</span>
   <span style="flex:1"></span>
   <span class="tb-btn" id="tb-min" title="Minimieren"><i class="ti ti-minus"></i></span>
   <span class="tb-btn" id="tb-max" title="Maximieren"><i class="ti ti-square"></i></span>
   <span class="tb-btn cl" id="tb-close" title="In Tray schließen"><i class="ti ti-x"></i></span>
  </div>
  <div class="cg-body">
   <div class="cg-head">
    <div>
     <p class="cg-h1" id="cg-title">Letzte 10 Tage</p>
     <p class="cg-sub"><i class="ti ti-circle-filled" style="font-size:8px;color:#5BD08A;vertical-align:1px"></i> Lock-Mitschnitt aktiv seit erstem Start · Daten in lock-log.json (auto-save)</p>
    </div>
    <div class="cg-acts">
     <button class="cg-btn" id="cg-refresh"><i class="ti ti-refresh"></i> Aktualisieren</button>
     <button class="cg-btn" id="cg-export"><i class="ti ti-download"></i> CSV</button>
     <button class="cg-btn amber" id="cg-copyall"><i class="ti ti-copy"></i> Kopieren (TSV)</button>
    </div>
   </div>
   <div class="cg-range">
    <span class="cg-rlabel">Zeitraum</span>
    <input type="date" id="cg-from" class="cg-date">
    <span class="cg-rlabel">bis</span>
    <input type="date" id="cg-to" class="cg-date">
    <button class="cg-btn" id="cg-apply"><i class="ti ti-check"></i> Anwenden</button>
   </div>
   <div class="cg-metrics">
    <div class="cg-metric"><div class="l">Ø Arbeitszeit / Tag</div><div class="v"><b id="m-work">–</b> h</div></div>
    <div class="cg-metric"><div class="l">Ø Pause / Tag</div><div class="v" id="m-pause">– min</div></div>
    <div class="cg-metric"><div class="l">Tage mit Lock-Daten</div><div class="v" id="m-days">– / –</div></div>
   </div>
   <div class="cg-grid">
    <div class="cg-colh">Datum</div>
    <div class="cg-colh">An</div>
    <div class="cg-colh">Aus</div>
    <div class="cg-colh">Arbeit</div>
    <div class="cg-colh"><div class="cg-scale" id="cg-scale"></div></div>
    <div class="cg-colh" style="text-align:right;padding-right:4px">Pause</div>
    <div class="cg-colh"></div>
   </div>
   <div id="cg-rows"></div>
   <div class="cg-foot">
    <span class="cg-key"><span class="cg-sw" style="background:#5BD08A"></span>An / Arbeitszeit</span>
    <span class="cg-key"><span class="cg-sw" style="background:#E2685A"></span>Aus</span>
    <span class="cg-key"><span class="cg-sw" style="background:#F4A23C"></span>Aktiv (PC an)</span>
    <span class="cg-key"><span class="cg-sw" style="background:#0B0E13;border:1px solid #2a323d"></span>Pause</span>
    <span class="cg-key"><span class="cg-muted">—</span>&nbsp;keine Lock-Historie</span>
   </div>
  </div>
 </div>
</div>
<div class="cg-grip" id="cg-grip" title="Größe ändern"></div>
<script>
const D=/*__DATA__*/[];
const RANGE=/*__RANGE__*/null;
const spanMins=D.flatMap(r=>(r.bs!=null&&r.be!=null)?[r.bs,r.be]:[]);
let aS=spanMins.length?Math.min.apply(null,spanMins):6*60;
let aE=spanMins.length?Math.max.apply(null,spanMins):24*60;
aS=Math.floor(aS/60)*60;aE=Math.ceil(aE/60)*60;
if(aE<=aS)aE=aS+60;
const aSpan=aE-aS;
const pct=m=>(m-aS)/aSpan*100;
(function(){
 const p15=15/aSpan*100,p60=60/aSpan*100;
 const g='repeating-linear-gradient(90deg,transparent 0,transparent calc('+p15+'% - 1px),rgba(255,255,255,.05) calc('+p15+'% - 1px),rgba(255,255,255,.05) '+p15+'%),repeating-linear-gradient(90deg,transparent 0,transparent calc('+p60+'% - 1px),rgba(255,255,255,.13) calc('+p60+'% - 1px),rgba(255,255,255,.13) '+p60+'%)';
 const st=document.createElement('style');st.textContent='.cg-track{background-image:'+g+'}';document.head.appendChild(st);
})();
function timeCell(v,color){
 if(v===null||v===undefined||v==="aus")return '<div class="cg-time cg-muted">'+(v==="aus"?"aus":"—")+'</div>';
 if(v==="läuft")return '<div class="cg-time" style="color:#F4A23C">läuft</div>';
 return '<div class="cg-time"><span class="cg-pip" style="background:'+color+'"></span>'+v+'</div>';
}
function workCell(r){
 if(!r.work)return '<div class="cg-work cg-muted">—</div>';
 return '<div class="cg-work">'+r.work+' <span class="cg-muted" style="font-size:11px">h</span></div>';
}
function hm(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function track(r){
 if(r.pcoff)return '<div class="cg-track"><div class="cg-note">PC aus</div></div>';
 if(r.bs==null||r.be==null)return '<div class="cg-track"><div class="cg-note">keine Daten</div></div>';
 let l=pct(r.bs),w=pct(r.be)-pct(r.bs);
 let bar='<div class="cg-bar-active" style="left:'+l+'%;width:'+w+'%"></div>';
 let gaps=(r.gaps||[]).map(g=>{let gl=pct(g[0]),gw=pct(g[1])-pct(g[0]);return '<div class="cg-gap" style="left:'+gl+'%;width:'+gw+'%" title="Pause '+hm(g[0])+'–'+hm(g[1])+'"></div>'}).join("");
 let ticks='<div class="cg-tick" style="left:'+pct(r.bs)+'%"></div><div class="cg-tick" style="left:'+pct(r.be)+'%"></div>';
 let onoff='<div class="cg-onoff"><span class="lab" style="left:'+pct(r.bs)+'%;color:#5BD08A">'+hm(r.bs)+'</span><span class="lab" style="left:'+pct(r.be)+'%;transform:translateX(-100%);color:#E2685A">'+hm(r.be)+'</span></div>';
 return '<div><div class="cg-track">'+bar+gaps+ticks+'</div>'+onoff+'</div>';
}
document.getElementById('cg-rows').innerHTML=D.map((r,i)=>(
 '<div class="cg-grid cg-row'+(r.data?'':' dim')+'">'+
 '<div class="cg-date-cell"><span>'+r.wd+'</span><b>'+r.d+'</b></div>'+
 timeCell(r.on,'#5BD08A')+
 timeCell(r.off==="läuft"?"läuft":(r.off||"aus"),'#E2685A')+
 workCell(r)+
 track(r)+
 '<div class="cg-sum">'+(r.pause!=null?(r.pause+' <span class="cg-muted" style="font-size:11px">min</span>'):'<span class="cg-muted">—</span>')+'</div>'+
 '<div class="cg-copy" data-i="'+i+'" title="Zeile kopieren"><i class="ti ti-copy"></i></div>'+
 '</div>'
)).join("");
(function(){
 const hrs=aSpan/60,step=hrs<=8?60:hrs<=16?120:180;
 let s='';
 for(let h=aS;h<=aE;h+=step){
  const tx=h===aS?'0':(h>=aE?'-100%':'-50%');
  s+='<span style="left:'+pct(h)+'%;transform:translateX('+tx+')">'+String(Math.floor(h/60)).padStart(2,'0')+'</span>';
 }
 document.getElementById('cg-scale').innerHTML=s;
})();
function tsvRow(r){
 return [r.wd+" "+r.d.replace(/\.$/,''),r.on||"",(r.off||"aus"),(r.work||""),(r.pause!=null?r.pause:"")].join("\t");
}
function csv(){
 const head=["Datum","An","Aus","Arbeit (h)","Pause (min)"].join(";");
 const rows=D.map(r=>[r.wd+" "+r.d.replace(/\.$/,''),r.on||"",(r.off||"aus"),(r.work||""),(r.pause!=null?r.pause:"")].join(";"));
 return [head].concat(rows).join("\r\n");
}
function copy(txt,el){
 const done=()=>{const o=el.innerHTML;el.innerHTML='<i class="ti ti-check"></i>';setTimeout(()=>el.innerHTML=o,900)};
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,done)}else{done()}
}
document.getElementById('cg-rows').addEventListener('click',e=>{const c=e.target.closest('.cg-copy');if(c)copy(tsvRow(D[+c.dataset.i]),c)});
document.getElementById('cg-copyall').addEventListener('click',e=>{
 const head="Datum\tAn\tAus\tArbeit (h)\tPause (min)";
 copy([head].concat(D.map(tsvRow)).join("\n"),e.currentTarget)
});
const rf=document.getElementById('cg-refresh');
if(rf)rf.addEventListener('click',()=>{ if(window.chrome&&window.chrome.webview) window.chrome.webview.postMessage('refresh'); });
document.getElementById('cg-export').addEventListener('click',()=>{
 if(window.chrome&&window.chrome.webview){window.chrome.webview.postMessage('export');return;}
 const blob=new Blob(["﻿"+csv()],{type:"text/csv;charset=utf-8"});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="cgv2-arbeitszeiten.csv";a.click();
});
if(RANGE){
 const fi=document.getElementById('cg-from'),ti=document.getElementById('cg-to');
 fi.value=RANGE.from;ti.value=RANGE.to;
 if(RANGE.today){fi.max=RANGE.today;ti.max=RANGE.today;}
 const fmt=s=>{const p=s.split('-');return p[2]+'.'+p[1]+'.'};
 document.getElementById('cg-title').textContent=fmt(RANGE.from)+' – '+fmt(RANGE.to)+RANGE.to.split('-')[0];
}
document.getElementById('cg-apply').addEventListener('click',()=>{
 const f=document.getElementById('cg-from').value,t=document.getElementById('cg-to').value;
 if(f&&t&&window.chrome&&window.chrome.webview)window.chrome.webview.postMessage('range:'+f+':'+t);
});
(function(){
 const dataRows=D.filter(r=>r.data&&!r.pcoff);
 const workVals=D.map(r=>r.work?parseFloat(r.work.replace(',','.')):null).filter(v=>v!=null);
 const avgW=workVals.length?workVals.reduce((a,b)=>a+b,0)/workVals.length:null;
 const pauseVals=dataRows.map(r=>r.pause!=null?parseInt(r.pause,10):null).filter(v=>v!=null);
 const avgP=pauseVals.length?Math.round(pauseVals.reduce((a,b)=>a+b,0)/pauseVals.length):null;
 document.getElementById('m-work').textContent=avgW!=null?avgW.toFixed(1).replace('.',','):'–';
 document.getElementById('m-pause').textContent=(avgP!=null?avgP:'–')+' min';
 document.getElementById('m-days').textContent=D.filter(r=>r.data).length+' / '+D.length;
})();
(function(){
 const bar=document.getElementById('cg-bar');
 const post=m=>{if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m)};
 document.getElementById('tb-min').onclick=()=>post('min');
 document.getElementById('tb-max').onclick=()=>post('max');
 document.getElementById('tb-close').onclick=()=>post('close');
 const grip=document.getElementById('cg-grip');
 if(grip)grip.addEventListener('mousedown',e=>{if(e.button!==0)return;e.preventDefault();e.stopPropagation();post('resize:br')});
 const E=6;
 function dir(e){const w=innerWidth,h=innerHeight,x=e.clientX,y=e.clientY,l=x<=E,r=x>=w-E,t=y<=E,b=y>=h-E;if(t&&l)return'tl';if(t&&r)return'tr';if(b&&l)return'bl';if(b&&r)return'br';if(l)return'l';if(r)return'r';if(t)return't';if(b)return'b';return''}
 const cur={l:'ew-resize',r:'ew-resize',t:'ns-resize',b:'ns-resize',tl:'nwse-resize',br:'nwse-resize',tr:'nesw-resize',bl:'nesw-resize'};
 addEventListener('mousemove',e=>{document.body.style.cursor=cur[dir(e)]||''});
 addEventListener('mousedown',e=>{if(e.button!==0)return;const d=dir(e);if(d)post('resize:'+d)});
 bar.addEventListener('mousedown',e=>{if(e.button!==0||dir(e)||e.target.closest('.tb-btn'))return;post('drag')});
 bar.addEventListener('dblclick',e=>{if(e.target.closest('.tb-btn'))return;post('max')});
})();
</script>
</body></html>
